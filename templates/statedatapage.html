<!DOCTYPE html>
<html> 

    <head>
        <meta charset="UTF-8">
        <title>{{statedisplay}}</title>
        <link rel="stylesheet" href="../static/datastyle.css">
    </head>

    <body>
        <h1>Search by State and Substance</h1>

        <!-- Combined Search Form -->
        <div class="search-box">
            <h2>Search by State and Substance</h2>

            <form onsubmit="event.preventDefault(); const state = document.getElementById('state').value; const substance = document.querySelector('input[name=\'statechoice\']:checked').value; window.location.href = `/state/${state}/substance/${substance}`;">
                <label for="state">Enter a State:</label>
                <input type="text" id="state" name="state_name" placeholder="Enter a state in the US">

                <br><br>

                <label>Select a Substance:</label>
                <input type="radio" id="Cocaine" name="substancechoice" value="Cocaine">
                <label for="Cocaine">Cocaine</label>

                <input type="radio" id="Tobacco" name="substancechoice" value="Tobacco">
                <label for="Tobacco">Tobacco</label>

                <input type="radio" id="Marijuana" name="substancechoice" value="Marijuana">
                <label for ="Marijuana">Marijuana</label>

                <input type="radio" id="Alcohol" name="substancechoice" value="Alcohol">
                <label for ="Alcohol">Alcohol</label>

                <button type="submit">Search</button>
            </form>
        </div>
        <!-- <h4>{{statedisplay}}</h4>
        <p>{{statedatadisplay}}</p> -->

    </body>
</html>
